<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encuesta de Salud</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div class="container">
        <h2>Encuesta de Salud</h2>
        <p>Por favor, completa la siguiente información.</p>

        <form id="encuestaSaludForm">

            <div class="form-group">
                <label>Edad (años):</label>
                <input type="number" id="edad" min="0" max="120" required placeholder="Ejemplo:25">
                <span class="error-message" id="edadError"></span>
            </div>

            <div class="form-group">
                <label>Peso (kg):</label>
                <input type="number" id="peso" min="1" max="500" step="0.1" required placeholder="Ejemplo:70.5">
                <span class="error-message" id="pesoError"></span>
            </div>

            <div class="form-group">
                <label>Altura (cm):</label>
                <input type="number" id="altura" min="50" max="250" required placeholder="Ejemplo:175">
                <span class="error-message" id="alturaError"></span>
            </div>

            <div class="form-group">
                <label>Pasos diarios promedio:</label>
                <input type="number" id="pasos_diarios" min="0" max="30000" required placeholder="Ejemplo:8000">
                <span class="error-message" id="pasosError"></span>
            </div>

            <div class="form-group">
                <label>Horas de sueño por noche:</label>
                <input type="number" id="horas_sueño" min="0" max="24" step="0.5" required placeholder="Ejemplo:7.5">
                <span class="error-message" id="suenoError"></span>
            </div>

            <div class="form-group">
                <label>Nivel de Dolor:</label>
                <input type="range" id="nivel_dolor" min="0" max="10" value="0">
                <span id="nivelDolorValor">0</span>
                <span class="error-message" id="dolorError"></span>
            </div>

            <div class="form-group">
                <label>Tipo de Sangre:</label>
                <select id="tipo_sangre" required>
                    <option value="">-- Selecciona --</option>
                    <option value="A+">A+</option>
                    <option value="A-">A-</option>
                    <option value="B+">B+</option>
                    <option value="B-">B-</option>
                    <option value="AB+">AB+</option>
                    <option value="AB-">AB-</option>
                    <option value="O+">O+</option>
                    <option value="O-">O-</option>
                </select>
                <span class="error-message" id="tipoSangreError"></span>
            </div>
            <div class="form-group">
                <label>Código Postal:</label>
                <input type="text" id="codigo_postal" pattern="[0-9]{5}" required maxlength="5" placeholder="Ejemplo: 12345">
                <span class="error-message" id="cpError">Debe ser exactamente 5 números.</span>
            </div>         

            <button type="button" onclick="enviarFormulario()">ENVIAR ENCUESTA</button>

        </form>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
